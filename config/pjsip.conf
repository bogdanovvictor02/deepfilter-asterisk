; ================================================================
; PJSIP Configuration for DeepFilterNet testing
; ================================================================

; --- Transport ---

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Your Mac's LAN IP — needed for external devices to receive audio
external_media_address=192.168.0.157
external_signaling_address=192.168.0.157
local_net=192.168.0.0/24
local_net=192.168.65.0/24
local_net=172.16.0.0/12
local_net=127.0.0.0/8

; --- Templates ---

[endpoint-template](!)
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
media_address=192.168.0.157

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=5
remove_existing=yes

; --- Extension 6001 ---

[6001](endpoint-template)
auth=6001
aors=6001
callerid="User One" <6001>

[6001](auth-template)
username=6001
password=secret6001

[6001](aor-template)

; --- Extension 6002 ---

[6002](endpoint-template)
auth=6002
aors=6002
callerid="User Two" <6002>

[6002](auth-template)
username=6002
password=secret6002

[6002](aor-template)
