; ================================================================
; Dialplan for DeepFilterNet testing
; ================================================================

[general]
static=yes
writeprotect=yes

[internal]

; --- Normal calls (no noise reduction) ---
; Dial 6001 or 6002

exten => 6001,1,NoOp(Calling 6001 - NO noise reduction)
 same => n,Dial(PJSIP/6001,30)
 same => n,Hangup()

exten => 6002,1,NoOp(Calling 6002 - NO noise reduction)
 same => n,Dial(PJSIP/6002,30)
 same => n,Hangup()

; --- Calls WITH Speex denoise (baseline comparison) ---
; Dial 7001 or 7002

exten => 7001,1,NoOp(Calling 6001 WITH Speex denoise)
 same => n,Set(DENOISE(rx)=on)
 same => n,Dial(PJSIP/6001,30)
 same => n,Hangup()

exten => 7002,1,NoOp(Calling 6002 WITH Speex denoise)
 same => n,Set(DENOISE(rx)=on)
 same => n,Dial(PJSIP/6002,30)
 same => n,Hangup()

; --- Calls WITH DeepFilterNet ---
; Dial 8001 or 8002 (works after func_deepfilter.so is loaded)

exten => 8001,1,NoOp(Calling 6001 WITH DeepFilterNet)
 same => n,Set(DEEPFILTER(rx)=on)
 same => n,Dial(PJSIP/6001,30)
 same => n,Hangup()

exten => 8002,1,NoOp(Calling 6002 WITH DeepFilterNet)
 same => n,Set(DEEPFILTER(rx)=on)
 same => n,Dial(PJSIP/6002,30)
 same => n,Hangup()

; --- Calls WITH DeepFilterNet on BOTH directions ---
; Dial 8801 or 8802

exten => 8801,1,NoOp(Calling 6001 WITH DeepFilterNet rx+tx)
 same => n,Set(DEEPFILTER(rx)=on)
 same => n,Set(DEEPFILTER(tx)=on)
 same => n,Dial(PJSIP/6001,30)
 same => n,Hangup()

exten => 8802,1,NoOp(Calling 6002 WITH DeepFilterNet rx+tx)
 same => n,Set(DEEPFILTER(rx)=on)
 same => n,Set(DEEPFILTER(tx)=on)
 same => n,Dial(PJSIP/6002,30)
 same => n,Hangup()

; --- Echo test (hear yourself) ---
; Dial 9999

exten => 9999,1,NoOp(Echo test - no processing)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; --- Echo test WITH DeepFilterNet ---
; Dial 9998

exten => 9998,1,NoOp(Echo test WITH DeepFilterNet)
 same => n,Answer()
 same => n,Set(DEEPFILTER(rx)=on)
 same => n,Echo()
 same => n,Hangup()

; --- Echo test WITH Speex (for comparison) ---
; Dial 9997

exten => 9997,1,NoOp(Echo test WITH Speex denoise)
 same => n,Answer()
 same => n,Set(DENOISE(rx)=on)
 same => n,Echo()
 same => n,Hangup()
